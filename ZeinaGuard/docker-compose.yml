services:
  # --- PostgreSQL (TimescaleDB) ---
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: zeinaguard_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-zeinaguard_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_change_me}
      POSTGRES_DB: ${DB_NAME:-zeinaguard_db}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=timescaledb"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/init-timescale.sql:/docker-entrypoint-initdb.d/02-timescale.sql
    networks:
      - zeinaguard_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: zeinaguard_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password_change_me}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zeinaguard_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_change_me}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Flask Backend ---
  flask-backend:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: zeinaguard_flask
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      FLASK_PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-zeinaguard_user}:${DB_PASSWORD:-secure_password_change_me}@postgres:5432/${DB_NAME:-zeinaguard_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password_change_me}@redis:6379/0
      JWT_SECRET_KEY: super_secure_very_long_secret_key_123456789_very_secure
      FLASK_DEBUG: 0
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app:ro
    networks:
      - zeinaguard_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python app.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # --- Next.js Frontend ---
  next-frontend:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    container_name: zeinaguard_nextjs
    environment:
      NEXT_PUBLIC_API_URL: /backend-api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
      BACKEND_URL: http://flask-backend:5000
    ports:
      - "3000:3000"
    volumes:
      - .:/app:ro
      - /app/node_modules
      - /app/.next
    networks:
      - zeinaguard_network
    depends_on:
      flask-backend:
        condition: service_healthy
    restart: unless-stopped

  # --- PgAdmin ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: zeinaguard_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zeinaguard.local
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin_password_change_me}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - zeinaguard_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  zeinaguard_network:
    driver: bridge