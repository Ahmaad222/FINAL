version: '3.9'

services:
  # PostgreSQL with TimescaleDB extension
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: zeinaguard_postgres
    environment:
      POSTGRES_USER: zeinaguard_user
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: zeinaguard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./scripts/init-timescale.sql:/docker-entrypoint-initdb.d/02-timescale.sql
    networks:
      - zeinaguard_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeinaguard_user -d zeinaguard_db || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis for message queue and caching
  redis:
    image: redis:7-alpine
    container_name: zeinaguard_redis
    command: redis-server --appendonly yes --requirepass redis_password_change_me
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - zeinaguard_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "redis_password_change_me", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask Backend (API + Socket.IO on port 5000)
  flask-backend:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: zeinaguard_flask
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      FLASK_PORT: 5000
      DATABASE_URL: postgresql://zeinaguard_user:secure_password_change_me@postgres:5432/zeinaguard_db
      REDIS_URL: redis://:redis_password_change_me@redis:6379/0
      JWT_SECRET_KEY: your_jwt_secret_key_change_me
      FLASK_DEBUG: 1
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    networks:
      - zeinaguard_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python app.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Next.js Frontend (host:3000 -> container:5000, Next.js dev listens on 5000)
  next-frontend:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
    container_name: zeinaguard_nextjs
    environment:
      NEXT_PUBLIC_API_URL: /backend-api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
      BACKEND_URL: http://flask-backend:5000
    ports:
      - "3000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - zeinaguard_network
    depends_on:
      flask-backend:
        condition: service_healthy

  # PgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: zeinaguard_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@zeinaguard.local
      PGADMIN_DEFAULT_PASSWORD: admin_password_change_me
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - zeinaguard_network
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  zeinaguard_network:
    driver: bridge
